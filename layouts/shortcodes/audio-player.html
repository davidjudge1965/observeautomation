<style>
  #oa-audio-player-wrap *, #oa-audio-player-wrap *::before, #oa-audio-player-wrap *::after { box-sizing: border-box; margin: 0; padding: 0; }

  #oa-audio-player-wrap {
    margin: 1.75rem auto;
    max-width: 560px;
    background: #f7f5f2;
    border: 1px solid #e2ddd8;
    border-radius: 12px;
    padding: 1.25rem 1.5rem 1.1rem;
    display: flex;
    flex-direction: column;
    gap: 0.75rem;
  }

  #oa-audio-player-wrap .ap-label {
    display: flex;
    align-items: center;
    gap: 0.6rem;
  }

  #oa-audio-player-wrap .ap-icon {
    width: 32px;
    height: 32px;
    background: #ffb632;
    border-radius: 50%;
    display: flex;
    align-items: center;
    justify-content: center;
    flex-shrink: 0;
  }

  #oa-audio-player-wrap .ap-icon svg {
    width: 14px;
    height: 14px;
    fill: #0f1117;
    margin-left: 2px; /* optical centre for play triangle */
  }

  #oa-audio-player-wrap .ap-title {
    font-family: inherit;
    font-size: 0.88rem;
    font-weight: 600;
    color: #1a1a1a;
    line-height: 1.3;
  }

  #oa-audio-player-wrap .ap-subtitle {
    font-size: 0.78rem;
    color: #888;
    font-weight: 400;
    margin-top: 0.1rem;
  }

  #oa-audio-player-wrap audio {
    width: 100%;
    height: 36px;
    border-radius: 6px;
    accent-color: #ffb632;
  }
</style>

<div id="oa-audio-player-wrap">
  <div class="ap-label">
    <div class="ap-icon">
      <svg viewBox="0 0 10 12" xmlns="http://www.w3.org/2000/svg"><polygon points="0,0 10,6 0,12"/></svg>
    </div>
    <div>
      <div class="ap-title">{{ with .Get "title" }}{{ . }}{{ else }}Hear the AI receptionist in action{{ end }}</div>
      <div class="ap-subtitle">Real example call — no actors, no script</div>
    </div>
  </div>
  <audio controls preload="none">
    <source src="{{ .Get "src" }}">
  </audio>
</div>

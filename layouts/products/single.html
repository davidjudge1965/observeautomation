{{define "main"}}
<article class="product-page">

  <div class="product-hero" style="background-image: url('{{ .Params.image }}'); background-position: {{ if .Params.hero_position }}{{ .Params.hero_position }}{{ else }}center{{ end }}">
    <div class="product-hero-overlay">
      <h1>{{ .Title }}</h1>
    </div>
  </div>

  <div class="product-body">
    {{ .Content }}
    {{ partial "product-what-you-need.html" . }}
    {{ partial "product-monthly-fee.html" . }}
    {{ partial "product-ownership.html" . }}
  </div>

</article>
{{end}}
